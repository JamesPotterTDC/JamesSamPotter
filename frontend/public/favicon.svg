<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#07090f"/>
  <!-- Rear wheel -->
  <circle cx="9" cy="22" r="7" fill="none" stroke="#fb923c" stroke-width="1.5"/>
  <!-- Front wheel -->
  <circle cx="23" cy="22" r="7" fill="none" stroke="#fb923c" stroke-width="1.5"/>
  <!-- Frame: chain stay -->
  <line x1="9" y1="22" x2="16" y2="22" stroke="#fb923c" stroke-width="1.5"/>
  <!-- Seat tube -->
  <line x1="16" y1="22" x2="14" y2="11" stroke="#fb923c" stroke-width="1.5"/>
  <!-- Top tube -->
  <line x1="14" y1="11" x2="21" y2="13" stroke="#fb923c" stroke-width="1.5"/>
  <!-- Down tube -->
  <line x1="16" y1="22" x2="22" y2="16" stroke="#fb923c" stroke-width="1.5"/>
  <!-- Seat stay -->
  <line x1="9" y1="22" x2="14" y2="11" stroke="#fb923c" stroke-width="1.2"/>
  <!-- Fork -->
  <line x1="22" y1="16" x2="23" y2="22" stroke="#fb923c" stroke-width="1.5"/>
  <!-- Saddle -->
  <line x1="11" y1="10" x2="17" y2="10" stroke="#fb923c" stroke-width="2" stroke-linecap="round"/>
</svg>
